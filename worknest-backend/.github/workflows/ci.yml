name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        working-directory: worknest-backend-main
      - run: node --test
        working-directory: worknest-backend-main
      - run: bash -lc 'for f in $(rg --files -g "*.js"); do node --check "$f" || exit 1; done'
        working-directory: worknest-backend-main
